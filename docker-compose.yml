version: "3.9"

services:
  # 🍃 MongoDB Database
  mongo:
    image: mongo:7
    container_name: trichmind-mongo
    ports:
      - "27018:27017" # ✅ Host 27018 → Container 27017 (MongoDB default)
    volumes:
      - mongo-data:/data/db
    restart: unless-stopped

  # 🤖 FastAPI ML Inference Service
  ml:
    build: ./ml
    container_name: trichmind-ml
    ports:
      - "8000:8000"
    environment:
      - PORT=8000
      - TZ=Europe/Stockholm
    depends_on:
      - mongo
    restart: unless-stopped

  # 🧱 Node.js Backend API
  server:
    build: ./server
    container_name: trichmind-server
    ports:
      - "8080:8080"
    env_file:
      - ./server/.env
    depends_on:
      - mongo
      - ml
    restart: unless-stopped

  # ⚛️ Next.js Frontend
  client:
    build: ./client
    container_name: trichmind-client
    ports:
      - "5000:3000" # ✅ Host 5000 → Next.js internal port 3000
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_API_URL=http://server:8080
    depends_on:
      - server
    restart: unless-stopped

# 🧱 Persistent volume for MongoDB
volumes:
  mongo-data:
