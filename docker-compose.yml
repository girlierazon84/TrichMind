version: "3.9"

services:
  # 🍃 MongoDB Database
  mongo:
    image: mongo:7
    container_name: trichmind-mongo
    ports:
      - "27018:27017"
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - mongo-data:/data/db
    restart: unless-stopped

  # 🤖 FastAPI ML Inference Service
  ml:
    build: ./ml
    container_name: trichmind-ml
    ports:
      - "8000:8000"
    env_file:
      - ./ml/.env
    depends_on:
      mongo:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/live"]
      interval: 30s
      timeout: 5s
      retries: 3
    restart: unless-stopped

  # 🧱 Node.js Backend API
  server:
    build: ./server
    container_name: trichmind-server
    ports:
      - "8080:8080"
    env_file:
      - ./server/.env.docker   # ⬅️ use Docker-specific env (mongo:27017, ML_BASE_URL=http://ml:8000)
    depends_on:
      mongo:
        condition: service_healthy
      ml:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3
    restart: unless-stopped

  # ⚛️ Next.js / Vite Frontend
  client:
    build: ./client
    container_name: trichmind-client
    ports:
      - "5050:5173" # Host 5050 → app inside container on 5173
    environment:
      - NODE_ENV=production
      # ⬇️ Browser must call backend via host, not Docker hostname
      - NEXT_PUBLIC_API_URL=http://localhost:8080
    depends_on:
      server:
        condition: service_healthy
    healthcheck:
      # Inside the container the dev server listens on 5173
      test: ["CMD", "curl", "-f", "http://localhost:5173"]
      interval: 30s
      timeout: 5s
      retries: 3
    restart: unless-stopped

volumes:
  mongo-data:
