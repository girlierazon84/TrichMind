version: "3.9"

services:
  # 🍃 MongoDB Database
  mongo:
    image: mongo:7
    container_name: trichmind-mongo
    ports:
      - "27018:27017"  # ✅ Host 27018 → Container 27017 (MongoDB default)
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - mongo-data:/data/db
    restart: unless-stopped

  # 🤖 FastAPI ML Inference Service
  ml:
    build: ./ml
    container_name: trichmind-ml
    ports:
      - "8000:8000"
    environment:
      - PORT=8000
      - TZ=Europe/Stockholm
    depends_on:
      - mongo
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/live"]
      interval: 30s
      timeout: 5s
      retries: 3
    restart: unless-stopped

  # 🧱 Node.js Backend API
  server:
    build: ./server
    container_name: trichmind-server
    ports:
      - "8080:8080"
    env_file:
      - ./server/.env
    depends_on:
      mongo:
        condition: service_healthy
      ml:
        condition: service_started
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3
    restart: unless-stopped

  # ⚛️ Next.js Frontend
  client:
    build: ./client
    container_name: trichmind-client
    ports:
      - "5050:5000"  # ✅ Host 5050 → Next.js internal port 5000
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_API_URL=http://server:8080
    depends_on:
      - server
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000"]
      interval: 30s
      timeout: 5s
      retries: 3
    restart: unless-stopped

# 🧱 Persistent volume for MongoDB
volumes:
  mongo-data:
