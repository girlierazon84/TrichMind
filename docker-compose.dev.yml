version: "3.9"

services:
  # ------------------------------------------------------
  # 🍃 MongoDB (Dev)
  # ------------------------------------------------------
  mongo:
    image: mongo:7
    container_name: trichmind-mongo-dev
    ports:
      - "27018:27017"
    volumes:
      - mongo-data-dev:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ------------------------------------------------------
  # 🤖 FastAPI ML Service (Dev)
  # ------------------------------------------------------
  ml:
    build:
      context: ./ml
      dockerfile: Dockerfile.dev
    container_name: trichmind-ml-dev
    ports:
      - "8000:8000"
    volumes:
      - ./ml:/ml               # live reload for ML code
      - ./ml/artifacts:/ml/artifacts
    env_file:
      - ./ml/.env
    environment:
      MODEL_PATH: "/ml/artifacts/training_outputs/best_models/best_relapse_risk_predictor_model.pkl"
      ENCODER_PATH: "/ml/artifacts/training_outputs/label_encoder/label_encoder.pkl"
      FEATURES_JSON: "/ml/artifacts/training_outputs/features.json"
      SCALER_PATH: "/ml/artifacts/training_outputs/scaler.pkl"
    command: uvicorn api.api:app --host 0.0.0.0 --port 8000 --reload
    depends_on:
      mongo:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/live"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ------------------------------------------------------
  # 🧱 Node.js Backend (Dev)
  # ------------------------------------------------------
  server:
    build:
      context: ./server
    container_name: trichmind-server-dev
    ports:
      - "8080:8080"
    volumes:
      - ./server:/server
      - /server/node_modules
    env_file:
      - ./server/.env
    environment:
      NODE_ENV: development
      ML_BASE_URL: http://ml:8000
      MONGO_URI: mongodb://mongo:27017/trichmind
    depends_on:
      mongo:
        condition: service_healthy
      ml:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/healthz"]
      interval: 10s
      timeout: 5s
      retries: 3
    restart: unless-stopped

  # ------------------------------------------------------
  # 🎨 Next.js Frontend (Dev)
  # ------------------------------------------------------
  client:
    build:
      context: ./client
    container_name: trichmind-client-dev
    ports:
      - "5050:5000"
    volumes:
      - ./client:/client
      - /client/node_modules
    environment:
      NODE_ENV: development
      NEXT_PUBLIC_API_URL: "http://localhost:8080"
      CHOKIDAR_USEPOLLING: "true"
    depends_on:
      server:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000"]
      interval: 10s
      timeout: 5s
      retries: 3
    restart: unless-stopped

# ------------------------------------------------------
# 📦 Volumes
# ------------------------------------------------------
volumes:
  mongo-data-dev:
