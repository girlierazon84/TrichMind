version: "3.9"

services:
  # -----------------------------
  # 🍃 MongoDB
  # -----------------------------
  mongo:
    image: mongo:7
    container_name: trichmind-mongo-dev
    ports:
      - "27018:27017"
    volumes:
      - mongo-data-dev:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # -----------------------------
  # 🤖 ML API (FastAPI)
  # -----------------------------
  ml:
    build:
      context: ./ml
      dockerfile: Dockerfile.dev
    container_name: trichmind-ml-dev
    ports:
      - "8000:8000"
    volumes:
      - ./ml:/ml
      - ./ml/artifacts:/ml/artifacts
    env_file:
      - ./ml/.env
    command: uvicorn api.api:app --host 0.0.0.0 --port 8000 --reload
    depends_on:
      mongo:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/live"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # -----------------------------
  # 🧱 Node Backend
  # -----------------------------
  server:
    build:
      context: ./server
      dockerfile: Dockerfile.dev
    container_name: trichmind-server-dev
    ports:
      - "8080:8080"
    volumes:
      - ./server:/app
      - /app/node_modules
    env_file:
      - ./server/.env
    environment:
      DOCKERIZED: "true"
    depends_on:
      mongo:
        condition: service_healthy
      ml:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/healthz"]
      interval: 10s
      timeout: 5s
      retries: 3
    restart: unless-stopped

  # -----------------------------
  # 🎨 Client (Next.js / Vite)
  # -----------------------------
  client:
    build:
      context: ./client
      dockerfile: Dockerfile.dev
    container_name: trichmind-client-dev
    ports:
      - "5173:5173"
    volumes:
      - ./client:/app
      - /app/node_modules
    environment:
      NEXT_PUBLIC_API_URL: "http://localhost:8080"
    depends_on:
      server:
        condition: service_healthy
    restart: unless-stopped

volumes:
  mongo-data-dev:
